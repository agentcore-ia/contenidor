name: Build and Push Docker image
on:
  push:
    branches: [main]
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/agentcore-ia/contenidor:latest .
      - run: docker push ghcr.io/agentcore-ia/contenidor:latest
      - name: Make package public (best effort)
        continue-on-error: true
        run: |
          gh api -X PATCH "/orgs/agentcore-ia/packages/container/contenidor/visibility" -f visibility=public 2>&1 ||
          gh api -X PATCH "/user/packages/container/contenidor/visibility" -f visibility=public 2>&1 ||
          echo "cannot make public"