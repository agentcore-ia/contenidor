name: Build and Push Docker image
on:
  push:
    branches: [main]
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/agentcore-ia/contenidor:latest .
      - run: docker push ghcr.io/agentcore-ia/contenidor:latest
      - name: Make package public
        run: |
          echo "=== Trying to make package public ==="
          # Try org namespace
          echo "--- Trying org namespace ---"
          gh api -X PATCH "/orgs/agentcore-ia/packages/container/contenidor/visibility" -f visibility=public 2>&1
          if [ $? -eq 0 ]; then echo "OK (org)"; exit 0; fi
          # Try user namespace
          echo "--- Trying user namespace ---"
          gh api -X PATCH "/user/packages/container/contenidor/visibility" -f visibility=public 2>&1
          if [ $? -eq 0 ]; then echo "OK (user)"; exit 0; fi
          # Try repo-scoped
          echo "--- Trying repo-scoped ---"
          gh api -X PATCH "/repos/agentcore-ia/contenidor/packages/container/contenidor/visibility" -f visibility=public 2>&1
          if [ $? -eq 0 ]; then echo "OK (repo)"; exit 0; fi
          echo "WARNING: could not make package public"